<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>World Time Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>World Time</h1>
            <div class="add-timezone">
                <input type="text" id="timezone-input" placeholder="Add timezone (e.g. America/New_York)" list="timezone-list">
                <datalist id="timezone-list"></datalist>
                <button id="add-btn">Add</button>
            </div>
            <button id="reset-btn" class="reset-btn">Reset to now</button>
            <button id="share-btn" class="share-btn">Share</button>
        </header>

        <div id="tracks-container" class="tracks-container">
        </div>
    </div>

    <div id="cursor-line" class="cursor-line">
        <div id="cursor-label" class="line-offset-label cursor-label"></div>
    </div>
    <div id="now-line" class="now-line">
        <div class="line-offset-label now-label">NOW</div>
    </div>
    <div id="now-indicator" class="now-indicator">
        <span class="now-indicator-arrow">◀</span>
    </div>

    <!-- Event modal -->
    <div id="event-modal" class="event-modal-overlay" aria-modal="true" role="dialog" aria-labelledby="modal-title">
        <div class="event-modal">
            <h2 id="modal-title">New Event</h2>
            <div class="modal-field">
                <label for="modal-label">Label</label>
                <input id="modal-label" type="text" placeholder="optional" autocomplete="off">
            </div>
            <div class="modal-field">
                <label for="modal-tz">Timezone</label>
                <select id="modal-tz"></select>
            </div>
            <div class="modal-field">
                <label for="modal-recurrence">Repeat</label>
                <select id="modal-recurrence">
                    <option value="">None</option>
                    <option value="daily">Daily</option>
                    <option value="weekdays">Weekdays (Mon–Fri)</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button id="modal-save" class="modal-btn modal-btn-save">Save</button>
                <button id="modal-delete" class="modal-btn modal-btn-delete">Delete</button>
                <button id="modal-cancel" class="modal-btn modal-btn-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/script.js"></script>
</body>
</html>
